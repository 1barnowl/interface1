version: "3.9"

# Interface Core — local dev stack
# Usage: docker compose up -d

services:

  # ── PostgreSQL (state + drift log) ─────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ic
      POSTGRES_PASSWORD: ic
      POSTGRES_DB: interface_core
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ic"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Redis (contract cache + leader election) ────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Zookeeper (required by Kafka) ──────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  # ── Kafka (event fabric + synthesis queue) ─────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Consul (service discovery + mesh) ──────────────────────────────────
  consul:
    image: hashicorp/consul:1.18
    ports:
      - "8500:8500"
      - "8600:8600/udp"
    command: agent -dev -ui -client=0.0.0.0
    healthcheck:
      test: ["CMD", "consul", "members"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── OpenTelemetry Collector ─────────────────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.100.0
    ports:
      - "4317:4317"    # OTLP gRPC
      - "4318:4318"    # OTLP HTTP
      - "8888:8888"    # Collector metrics
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml
    depends_on:
      - jaeger
      - prometheus

  # ── Jaeger (traces) ─────────────────────────────────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:1.57
    ports:
      - "16686:16686"   # UI
      - "14317:4317"    # OTLP gRPC (remapped to avoid conflict)
    environment:
      COLLECTOR_OTLP_ENABLED: "true"

  # ── Prometheus (metrics scrape) ─────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.52.0
    ports:
      - "9091:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"

  # ── Grafana (dashboards) ────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.2
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - jaeger

  # ── Interface Core daemon ───────────────────────────────────────────────
  interface-core:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      consul:
        condition: service_healthy
    environment:
      IC_POSTGRES_DSN:    postgresql://ic:ic@postgres:5432/interface_core
      IC_REDIS_URL:       redis://redis:6379/0
      IC_KAFKA_BROKERS:   kafka:9092
      IC_CONSUL_HOST:     consul
      IC_OTEL_ENDPOINT:   http://otel-collector:4317
      IC_ZMQ_PUB_ADDR:    tcp://0.0.0.0:5555
      IC_ZMQ_SUB_ADDR:    tcp://127.0.0.1:5555
      IC_SECRET_KEY:      ${IC_SECRET_KEY:-change-me-in-prod}
    ports:
      - "9090:9090"   # Prometheus metrics
      - "5555:5555"   # ZeroMQ event bus
    volumes:
      - .:/app
    restart: unless-stopped

volumes:
  pg_data:
  redis_data:
  grafana_data:
