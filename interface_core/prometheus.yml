global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "interface_core"
    static_configs:
      - targets: ["interface-core:9090"]

  - job_name: "otel_collector"
    static_configs:
      - targets: ["otel-collector:8889"]

  - job_name: "kafka"
    static_configs:
      - targets: ["kafka:7071"]

  - job_name: "postgres"
    static_configs:
      - targets: ["postgres:9187"]
